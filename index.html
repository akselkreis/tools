const cats = { fish:"Fish / Seafood", poultry:"Poultry", bean:"Beans / Legumes", tofu:"Tofu / Tempeh", pasta:"Pasta / Noodles", veg:"Vegetarian other" };
const badgeClass = { fish:"b-fish", poultry:"b-poultry", bean:"b-bean", tofu:"b-tofu", pasta:"b-pasta", veg:"b-veg" };

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const c = document.getElementById("cat").value;
  const filtered = meals.filter(m =>
    (c === "all" || m.cat === c) &&
    (!q || m.name.toLowerCase().includes(q))
  );
  const grid = document.getElementById("grid");
  document.getElementById("count").textContent = filtered.length + " meals";
  if (!filtered.length) { grid.innerHTML = '<p class="no-results">No meals match.</p>'; return; }
  grid.innerHTML = filtered.map(m =>
    `<div class="meal">${m.name}<div class="cat"><span class="badge ${badgeClass[m.cat]}">${cats[m.cat]}</span></div></div>`
  ).join("");
}

render();
